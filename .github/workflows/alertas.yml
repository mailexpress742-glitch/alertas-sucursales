name: Alertas Inteligentes

on:
  workflow_dispatch:
    inputs:
      email_dry_run:
        description: "Generar preview sin enviar mails reales"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      allow_sample_preview_on_db_failure:
        description: "En dry-run, generar preview de muestra si la base no responde"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      send_sample_email_on_db_failure:
        description: "Enviar por mail el preview de muestra si la base no responde"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "15 11 * * 1-5"

jobs:
  run-alerts:
    runs-on: [self-hosted, Windows, X64]

    defaults:
      run:
        shell: powershell

    env:
      DB_TYPE: ${{ secrets.DB_TYPE || 'mariadb' }}
      DB_SERVER: ${{ secrets.DB_SERVER || 'mexreplica.epresis.com' }}
      DB_NAME: ${{ secrets.DB_NAME || 'mex_lv' }}
      DB_USER: ${{ secrets.DB_USER || 'readonly_mex' }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_PORT: ${{ secrets.DB_PORT || '3345' }}
      DB_DRIVER: ${{ secrets.DB_DRIVER || 'pymysql' }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER || secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.SMTP_PASS }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
      EMAIL_DRY_RUN: ${{ github.event.inputs.email_dry_run || secrets.EMAIL_DRY_RUN || 'false' }}
      EMAIL_PREVIEW_DIR: data/email_previews
      MAIL_FROM: ${{ secrets.MAIL_FROM || secrets.SMTP_USER }}
      MAIL_TO: ${{ secrets.MAIL_TO || secrets.REPORT_EMAILS || 'gpereyra@mailexpress.com.ar,airisarri@mailexpress.com.ar,mzera@mailexpress.com.ar' }}
      ALERT_DAYS_THRESHOLD: ${{ secrets.ALERT_DAYS_THRESHOLD || '7' }}
      ALERT_AMOUNT_THRESHOLD: ${{ secrets.ALERT_AMOUNT_THRESHOLD || '100000' }}
      ENABLED_RULES: ${{ secrets.ENABLED_RULES || 'guide_due_date' }}
      GUIDE_DUE_DATE_COLUMN: ${{ secrets.GUIDE_DUE_DATE_COLUMN || 'fecha_vencimiento' }}
      GUIDE_LOOKAHEAD_DAYS: ${{ secrets.GUIDE_LOOKAHEAD_DAYS || '7' }}
      GUIDE_MAX_ROWS: ${{ secrets.GUIDE_MAX_ROWS || '1000' }}
      GUIDE_ONLY_ACTIVE: ${{ secrets.GUIDE_ONLY_ACTIVE || 'true' }}
      GUIDE_ONLY_UNFINISHED: ${{ secrets.GUIDE_ONLY_UNFINISHED || 'true' }}
      SUCURSAL_RECIPIENTS_JSON: ${{ secrets.SUCURSAL_RECIPIENTS_JSON }}
      SUCURSAL_GROUPS_JSON: ${{ secrets.SUCURSAL_GROUPS_JSON }}
      ALLOW_SAMPLE_PREVIEW_ON_DB_FAILURE: ${{ github.event.inputs.allow_sample_preview_on_db_failure || secrets.ALLOW_SAMPLE_PREVIEW_ON_DB_FAILURE || 'false' }}
      SEND_SAMPLE_EMAIL_ON_DB_FAILURE: ${{ github.event.inputs.send_sample_email_on_db_failure || 'false' }}
      RUNNER_LOCAL_ENV_FILE: 'C:\Users\SIST03\Documents\Alertas Inteligentes - Sucursales\.env'
      ENVIRONMENT: github_actions
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQL Server ODBC driver
        if: ${{ env.DB_TYPE == 'mssql' || env.DB_TYPE == 'sqlserver' || env.DB_TYPE == 'sql_server' }}
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load runner local .env
        if: ${{ runner.os == 'Windows' }}
        run: |
          $envFile = $env:RUNNER_LOCAL_ENV_FILE
          if (-not (Test-Path -LiteralPath $envFile)) {
            Write-Host "Runner local .env not found. Continuing with GitHub secrets/defaults."
            exit 0
          }

          @'
          import os
          from pathlib import Path
          from dotenv import dotenv_values

          env_file = Path(os.environ["RUNNER_LOCAL_ENV_FILE"])
          github_env = Path(os.environ["GITHUB_ENV"])
          loaded = 0

          with github_env.open("a", encoding="utf-8") as output:
              for name, value in dotenv_values(env_file).items():
                  if not name or value is None:
                      continue
                  if os.environ.get(name):
                      continue
                  delimiter = f"ENV_{name}_EOF"
                  while delimiter in value:
                      delimiter += "_X"
                  output.write(f"{name}<<{delimiter}\n{value}\n{delimiter}\n")
                  loaded += 1

          print(f"Loaded {loaded} missing value(s) from runner-local .env.")
          '@ | python -

      - name: Run tests
        run: |
          $pytestTemp = Join-Path $env:RUNNER_TEMP "pytest"
          New-Item -ItemType Directory -Path $pytestTemp -Force | Out-Null
          pytest --basetemp $pytestTemp

      - name: Run alert engine
        id: run_alert_engine
        continue-on-error: true
        run: |
          python -m app.main

      - name: Generate sample preview when database is unreachable in dry-run
        if: ${{ steps.run_alert_engine.outcome == 'failure' && env.EMAIL_DRY_RUN == 'true' && env.ALLOW_SAMPLE_PREVIEW_ON_DB_FAILURE == 'true' }}
        run: |
          echo "The alert engine could not reach the database from GitHub Actions."
          echo "Generating a sample email preview so the dry-run workflow can still validate the email layout."
          if ($env:SEND_SAMPLE_EMAIL_ON_DB_FAILURE -eq "true") {
            echo "Sample preview email sending is enabled for this manual run."
            $env:SAMPLE_PREVIEW_EMAIL_DRY_RUN = "false"
          } else {
            $env:SAMPLE_PREVIEW_EMAIL_DRY_RUN = "true"
          }
          python scripts/generate_sample_alert_preview.py

      - name: Fail run when alert engine failed
        if: ${{ steps.run_alert_engine.outcome == 'failure' && (env.EMAIL_DRY_RUN != 'true' || env.ALLOW_SAMPLE_PREVIEW_ON_DB_FAILURE != 'true') }}
        run: |
          echo "The alert engine failed."
          echo "Verify that the runner can access mexreplica.epresis.com:3345 and that the database credentials are valid."
          exit 1

      - name: Upload email previews
        if: ${{ env.EMAIL_DRY_RUN == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: email-previews
          path: data/email_previews/
          if-no-files-found: ignore
