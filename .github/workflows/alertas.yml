name: Alertas Inteligentes

on:
  workflow_dispatch:
    inputs:
      email_dry_run:
        description: "Generar preview sin enviar mails reales"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "15 11 * * 1-5"

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    env:
      DB_TYPE: ${{ secrets.DB_TYPE }}
      DB_SERVER: ${{ secrets.DB_SERVER }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_DRIVER: ${{ secrets.DB_DRIVER }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER || secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.SMTP_PASS }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
      EMAIL_DRY_RUN: ${{ github.event.inputs.email_dry_run || secrets.EMAIL_DRY_RUN || 'false' }}
      EMAIL_PREVIEW_DIR: data/email_previews
      MAIL_FROM: ${{ secrets.MAIL_FROM || secrets.SMTP_USER }}
      MAIL_TO: ${{ secrets.MAIL_TO || secrets.REPORT_EMAILS }}
      ALERT_DAYS_THRESHOLD: ${{ secrets.ALERT_DAYS_THRESHOLD }}
      ALERT_AMOUNT_THRESHOLD: ${{ secrets.ALERT_AMOUNT_THRESHOLD }}
      ENABLED_RULES: ${{ secrets.ENABLED_RULES }}
      GUIDE_DUE_DATE_COLUMN: ${{ secrets.GUIDE_DUE_DATE_COLUMN }}
      GUIDE_LOOKAHEAD_DAYS: ${{ secrets.GUIDE_LOOKAHEAD_DAYS }}
      GUIDE_MAX_ROWS: ${{ secrets.GUIDE_MAX_ROWS }}
      GUIDE_ONLY_ACTIVE: ${{ secrets.GUIDE_ONLY_ACTIVE }}
      GUIDE_ONLY_UNFINISHED: ${{ secrets.GUIDE_ONLY_UNFINISHED }}
      SUCURSAL_RECIPIENTS_JSON: ${{ secrets.SUCURSAL_RECIPIENTS_JSON }}
      SUCURSAL_GROUPS_JSON: ${{ secrets.SUCURSAL_GROUPS_JSON }}
      ENVIRONMENT: github_actions
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQL Server ODBC driver
        if: ${{ env.DB_TYPE == 'mssql' || env.DB_TYPE == 'sqlserver' || env.DB_TYPE == 'sql_server' }}
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Run alert engine
        run: |
          python -m app.main

      - name: Upload email previews
        if: ${{ env.EMAIL_DRY_RUN == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: email-previews
          path: data/email_previews/
          if-no-files-found: ignore
